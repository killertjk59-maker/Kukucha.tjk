{% extends "base.html" %}
{% from "_product_card.html" import product_card %}
{% block content %}
<h1 class="text-xl font-extrabold mb-4">Дӯстдоштаҳо</h1>
{% if favorites %}
<div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
  {% for f in favorites %}{{ product_card(f.product) }}{% endfor %}
</div>
{% else %}
<div class="text-center py-16 text-espresso/50">
  <p class="text-4xl mb-3">❤️</p>
  <p>Шумо ҳанӯз маҳсулоте интихоб накардаед.</p>
</div>
{% endif %}
{% endblock %}
