{% extends "base.html" %}
{% block content %}
<h1 class="text-xl font-extrabold mb-4">Ҳамаи категорияҳо</h1>
<div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
  {% for c in categories %}
  <a href="{{ url_for('main.category', slug=c.slug) }}" class="card-premium rounded-3xl p-6 flex flex-col items-center gap-2">
    <span class="text-4xl">{{ c.icon }}</span>
    <span class="font-bold text-sm">{{ c.name }}</span>
    <span class="text-xs text-espresso/50">{{ c.products|length }} маҳсулот</span>
  </a>
  {% endfor %}
</div>
{% if not categories %}
<p class="text-center text-espresso/50 py-16">Категория ёфт нашуд.</p>
{% endif %}
{% endblock %}
