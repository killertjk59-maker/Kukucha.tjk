{% extends "admin/base.html" %}
{% block admin_content %}
<h1 class="text-2xl font-extrabold mb-6">Мизоҷон</h1>
<div class="card-premium rounded-2xl overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-beige/60 text-left"><tr>
      <th class="p-3">Ном</th><th class="p-3">Телефон</th><th class="p-3">Фармоишҳо</th><th class="p-3">Сабти ном</th>
    </tr></thead>
    <tbody>
      {% for c in customers %}
      <tr class="border-t border-latte/20">
        <td class="p-3 font-semibold">{{ c.full_name }}</td>
        <td class="p-3">{{ c.phone }}</td>
        <td class="p-3">{{ c.orders|length }}</td>
        <td class="p-3 text-xs">{{ c.created_at.strftime('%d.%m.%Y') }}</td>
      </tr>
      {% else %}
      <tr><td colspan="4" class="p-6 text-center text-espresso/50">Мизоҷ нест.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
